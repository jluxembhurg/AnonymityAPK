[tool.briefcase]
project_name = "Anonymity"
bundle = "org.vloggerguard"
version = "0.1.0"
url = "https://github.com/jluxembhurg/AnonymityAPK"
author = "VloggerGuard"
author_email = "dev@vloggerguard.local"
license = "Proprietary"

[tool.briefcase.app.anonymity]
formal_name = "Anonymity"
description = "Real-time face anonymity for vloggers"
long_description = "Selectively blurs unrecognized faces in real-time video."
icon = "src/anonymity/resources/anonymity"
sources = ["src/anonymity"]
requires = [
    "numpy",
]

[tool.briefcase.app.anonymity.android]
requires = [
    "numpy",
]
icon = "src/anonymity/resources/anonymity"
splash = "src/anonymity/resources/anonymity"
splash_background_color = "#121212"

# Android SDK / NDK settings
build_gradle_dependencies = [
    "org.opencv:opencv:4.9.0",
]

permissions = {
    "android.permission.CAMERA" = "Detect and blur faces in real time",
    "android.permission.INTERNET" = "Serve local WebView UI",
    "android.permission.WRITE_EXTERNAL_STORAGE" = "Save recordings",
    "android.permission.READ_EXTERNAL_STORAGE" = "Load vlogger profiles",
    "android.permission.RECORD_AUDIO" = "Record audio",
}
