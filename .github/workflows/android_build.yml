name: Build Android APK (Briefcase)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Clean Java 17 setup — no apt mess, no JAVA_HOME guessing
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            build-essential \
            libssl-dev

      - name: Install Briefcase
        run: |
          pip install --upgrade pip
          pip install "briefcase==0.3.19"


      # The repository is now refactored into a standard Briefcase layout
      # with the 'anonymity/' package inside 'src/'.
      - name: Verify package structure
        run: |
          ls -R src/anonymity
          echo "Package structure verified."

      # Create the Android Gradle project
      - name: Briefcase Create
        run: briefcase create android gradle --no-input -v

      # Compile the APK
      - name: Briefcase Build
        run: briefcase build android gradle --no-input -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anonymity-apk
          path: build/anonymity/android/gradle/app/build/outputs/apk/debug/*.apk
