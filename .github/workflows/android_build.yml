name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # ubuntu-22.04 is required — ubuntu-24 breaks libffi's autoconf/libtool macros
    runs-on: ubuntu-22.04

    env:
      # Force Java 17 — runner default JAVA_HOME points to JDK 11 which breaks Gradle
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf automake \
            libtool libtool-bin \
            pkg-config \
            build-essential \
            gettext \
            zlib1g-dev \
            libncurses-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            patch \
            m4
          # Confirm Java 17 is active
          java -version

      - name: Install Python build tools
        run: |
          pip3 install --user \
            "buildozer==1.5.0" \
            "cython==0.29.37" \
            "python-for-android==2023.09.16" \
            virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Build with Buildozer
        run: |
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anonymity-apk
          path: bin/*.apk
