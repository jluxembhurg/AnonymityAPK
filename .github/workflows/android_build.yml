name: Build Android APK (Briefcase)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Clean Java 17 setup — no apt mess, no JAVA_HOME guessing
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            build-essential \
            libssl-dev

      - name: Install Briefcase
        run: |
          pip install --upgrade pip
          pip install "briefcase==0.3.19"

      # Accept all Android SDK licenses before Briefcase runs
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "ndk;25.2.9519653" || true

      # Copy flat .py source modules and resources into the src/anonymity package.
      # This follows the standard Briefcase layout (src/app_name).
      - name: Prepare anonymity package
        run: |
          mkdir -p src/anonymity/resources
          for f in detector.py recognizer.py enrollment.py tracker.py \
                   web_bridge.py gui.py main_android.py main_anonymity.py; do
            cp "$f" "src/anonymity/$f"
          done
          # Copy resources (icon, etc) — already created locally but ensure CI has them
          cp anonymity/resources/anonymity.png src/anonymity/resources/anonymity.png || true
          cp anonymity/__init__.py src/anonymity/__init__.py || true
          cp anonymity/__main__.py src/anonymity/__main__.py || true
          
          # Copy data and model files needed at runtime
          cp -r models src/anonymity/models || true
          cp -r data   src/anonymity/data   || true
          cp -r anonymity_ui src/anonymity/anonymity_ui || true

      # Create the Android Gradle project
      - name: Briefcase Create
        run: briefcase create android gradle --no-input -v

      # Compile the APK
      - name: Briefcase Build
        run: briefcase build android gradle --no-input -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anonymity-apk
          path: build/anonymity/android/gradle/app/build/outputs/apk/debug/*.apk
